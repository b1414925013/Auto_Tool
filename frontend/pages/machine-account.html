<div class="card">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">机机账号管理</h4>
            <div class="d-flex align-items-center">
                <div class="input-group mr-3" style="width: 300px;">
                    <input type="text" id="search-input" class="form-control" placeholder="根据IP地址搜索...">
                    <div class="input-group-append">
                        <button id="search-btn" class="btn btn-outline-primary">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>
                <button id="add-account-btn" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 新增机机账号
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>IP地址</th>
                        <th>端口</th>
                        <th>账号</th>
                        <th>密码</th>
                        <th>类型</th>
                        <th>机机账号</th>
                        <th>机机密码</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="account-table-body">
                    <!-- 数据将通过 JavaScript 动态加载 -->
                </tbody>
            </table>
        </div>
    </div>
    <!-- 分页控件将通过 JavaScript 动态添加 -->
</div>

<!-- 新增/编辑机机账号模态框 -->
<div class="modal fade" id="account-modal" tabindex="-1" aria-labelledby="account-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="account-modal-label">新增机机账号</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="account-form">
                    <input type="hidden" id="account-id">
                    <div class="row">
                        <div class="form-group col-md-6">
                            <label for="ip">IP地址 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="ip" placeholder="请输入IP地址" required>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="port">端口 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="port" placeholder="请输入端口" value="45339" min="1" max="65535" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group col-md-6">
                            <label for="account">账号 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="account" placeholder="请输入账号" required>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="password">密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="form-group col-md-6">
                            <label for="type">类型</label>
                            <input type="text" class="form-control" id="type" placeholder="请输入类型">
                        </div>
                        <div class="form-group col-md-6">
                            <label for="machine-account">机机账号</label>
                            <input type="text" class="form-control" id="machine-account" placeholder="机机账号（自动生成）" readonly>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="machine-password">机机密码</label>
                        <input type="password" class="form-control" id="machine-password" placeholder="机机密码（自动生成）" readonly>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <div class="mr-auto">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="regenerate-checkbox">
                        <label class="form-check-label" for="regenerate-checkbox">重新生成机机账号密码</label>
                    </div>
                </div>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" id="save-account-btn" class="btn btn-primary">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 页面特定的 JavaScript -->
<script type="module">
    // 导入页面初始化函数
    import { initMachineAccountPage } from '/frontend/js/machine-account.js';
    
    // 页面加载完成后初始化
    $(document).ready(function() {
        initMachineAccountPage();
    });
</script>
