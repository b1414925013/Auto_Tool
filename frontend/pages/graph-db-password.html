<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="card-title">图数据库密码管理</h5>
        <button class="btn btn-primary" id="add-password-btn">
            <i class="fas fa-plus"></i> 新增
        </button>
    </div>
    <div class="card-body">
        <!-- 搜索框 -->
        <div class="mb-4">
            <div class="input-group">
                <input type="text" class="form-control" placeholder="搜索环境编号或跳板机IP..." id="search-input">
                <div class="input-group-append">
                    <button class="btn btn-outline-secondary" id="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 数据表格 -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>环境编号</th>
                        <th>跳板机IP</th>
                        <th>pass-core节点ip</th>
                        <th>图数据库密码</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="password-table-body">
                    <!-- 数据将通过 JavaScript 动态填充 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 新增/编辑密码模态框 -->
<div class="modal fade" id="password-modal" tabindex="-1" role="dialog" aria-labelledby="password-modal-label" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="password-modal-label">新增图数据库密码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="password-form">
                    <input type="hidden" id="password-id">
                    
                    <!-- 环境编号 -->
                    <div class="form-group">
                        <label for="environment-id" class="form-label">环境编号 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="environment-id" name="environment-id" required>
                    </div>
                    
                    <!-- 跳板机信息 -->
                    <div class="form-group mt-3">
                        <label class="form-label">跳板机信息</label>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="jump-server-ip" class="form-label">IP <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="jump-server-ip" name="jump-server-ip" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="jump-server-port" class="form-label">Port <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="jump-server-port" name="jump-server-port" value="22" min="1" max="65535" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="jump-server-account" class="form-label">账号 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="jump-server-account" name="jump-server-account" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="jump-server-password" class="form-label">密码 <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" id="jump-server-password" name="jump-server-password" required>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- pass-core节点信息 -->
                    <div class="form-group mt-3">
                        <label class="form-label">pass-core节点信息</label>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="pass-core-ip" class="form-label">IP <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="pass-core-ip" name="pass-core-ip" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="pass-core-port" class="form-label">Port <span class="text-danger">*</span></label>
                                    <input type="number" class="form-control" id="pass-core-port" name="pass-core-port" value="22" min="1" max="65535" required>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="pass-core-account" class="form-label">账号 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="pass-core-account" name="pass-core-account" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="pass-core-password" class="form-label">密码 <span class="text-danger">*</span></label>
                                    <input type="password" class="form-control" id="pass-core-password" name="pass-core-password" required>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="pass-core-root-password" class="form-label">Root密码 <span class="text-danger">*</span></label>
                            <input type="password" class="form-control" id="pass-core-root-password" name="pass-core-root-password" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="save-password-btn">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 页面特定的 JavaScript -->
<script type="module">
    // 导入页面初始化函数，添加时间戳防止缓存
    import { initGraphDBPasswordPage } from '/frontend/js/graph-db-password.js?v=4';
    
    // 页面加载完成后初始化
    $(document).ready(function() {
        initGraphDBPasswordPage();
    });
</script>
